components:
  schemas:
    JournalBatchDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reference:
          type: string
        status:
          type: string
          enum:
          - OPEN
          - POSTED
          - CANCELLED
          - REVERSED
        batchDate:
          type: string
          format: date
        remarks:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    JournalEntryDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        transactionId:
          type: string
        sourceModule:
          type: string
        totalAmount:
          type: number
        description:
          type: string
        entryDate:
          type: string
          format: date-time
        posted:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    JournalLineDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entryId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        amount:
          type: number
        drCr:
          type: string
          enum:
          - DR
          - CR
        memo:
          type: string
        fxCurrency:
          type: string
        fxRate:
          type: number
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GlAccountDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
          - ASSET
          - LIABILITY
          - INCOME
          - EXPENSE
          - EQUITY
        parentId:
          type: string
          format: uuid
        active:
          type: boolean
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        leaf:
          type: boolean
    PaginationResponseJournalBatchDTO:
      type: object
      properties:
        content:
          type: array
          description: The list of items for the current page.
          items:
            $ref: "#/components/schemas/JournalBatchDTO"
        totalElements:
          type: integer
          description: The total number of elements across all pages.
          format: int64
        totalPages:
          type: integer
          description: The total number of pages based on the data size and page size.
          format: int32
        currentPage:
          type: integer
          description: "The current page number, typically zero-based."
          format: int32
      description: Represents a paginated response containing a list of items and
        pagination metadata.
    PaginationResponseJournalEntryDTO:
      type: object
      properties:
        content:
          type: array
          description: The list of items for the current page.
          items:
            $ref: "#/components/schemas/JournalEntryDTO"
        totalElements:
          type: integer
          description: The total number of elements across all pages.
          format: int64
